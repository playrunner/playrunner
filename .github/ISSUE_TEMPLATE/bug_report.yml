name: Bug Report 🪲
description: Create a bug report to help us improve
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        # Please follow these steps first:
  - type: markdown
    attributes:
      value: |
        ## Troubleshoot
        If Playrunner is not behaving the way you expect, please review the [documentation](https://playrunner.github.io/playrunner/docs/) and search existing issues for related reports.
        Please make reasonable efforts to troubleshoot and rule out issues with your local setup, workflow configuration, runner image, cloud provider configuration, or any third-party service you might be using.
  - type: markdown
    attributes:
      value: |
        ## Ask for help through appropriate channels
        If you feel unsure about the cause of the problem, consider asking for help in our [Discord channel](https://discord.gg/23yz25kat) before posting a bug report. The issue tracker is not a help forum.
  - type: markdown
    attributes:
      value: |
        ## Make a minimal reproduction
        To file the report, please provide a minimal (but complete) example and simple/clear steps on how to reproduce the bug. Link to a GitHub repository when the issue depends on workflow code, test code, or configuration files.
        The simpler you can make it, the more likely we are to successfully verify and fix the bug. Include only the workflow, configuration, test files, and dependencies needed to reproduce the problem.
        Do not include credentials, tokens, private repository contents, or production data.
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Bug reports without a minimal reproduction will be rejected.

        ---
  - type: input
    id: version
    attributes:
      label: Playrunner version
      description: |
        The Playrunner version, tag, branch, or commit SHA you are using.
      placeholder: ex. v0.1.0, main, or abc1234
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Please link to a repository with a minimal reproduction and describe accurately how we can reproduce/verify the bug.
      placeholder: |
        Example steps (replace with your own):
        1. Clone my repo at https://github.com/<myuser>/example
        2. Run ./start-local.sh
        3. Open http://127.0.0.1:3000 and import the included workflow
        4. Run the workflow and observe the error in the execution log
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A description of what you expect to happen.
      placeholder: I expect to see X or Y
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Actual behavior
      description: |
        A clear and concise description of the unexpected behavior.
        Please include any relevant output here, especially any error messages.
      placeholder: A bug happened!
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please include the relevant local or deployment environment details.
        This will be automatically formatted as a code block, so no need for backticks.
      placeholder: |
        System:
          OS: macOS 15.5
        Binaries:
          Node: 20.19.0
          npm: 10.8.2
          Docker: 27.5.1
        Playrunner:
          Startup command: ./start-local.sh
          Runner: Local Docker or GCP Cloud Run
          Browser/runtime: chromium / TypeScript
      render: shell
    validations:
      required: true
