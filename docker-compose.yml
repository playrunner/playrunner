services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playrunner}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - playrunner-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-playrunner}"]
      interval: 5s
      timeout: 5s
      retries: 20

  pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command:
      [
        "gcloud",
        "beta",
        "emulators",
        "pubsub",
        "start",
        "--host-port=0.0.0.0:${PUBSUB_EMULATOR_PORT:-8085}",
        "--project=${LOCAL_PUBSUB_PROJECT_ID:-playrunner-local}",
      ]
    ports:
      - "${PUBSUB_EMULATOR_PORT:-8085}:${PUBSUB_EMULATOR_PORT:-8085}"

volumes:
  playrunner-postgres-data:
