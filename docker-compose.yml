services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: playrunner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - playrunner-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d playrunner"]
      interval: 5s
      timeout: 5s
      retries: 20

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    ports:
      - "8085:8085"
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085

volumes:
  playrunner-postgres-data:
